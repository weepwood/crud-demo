server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never

spring:
  application:
    name: crud-demo
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crud_demo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 1
      connection-timeout: 10000
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  crud:
    username: ${APP_USERNAME:admin}
    password: ${APP_PASSWORD:change-me-now}
    read-only: ${APP_READ_ONLY:false}
    max-page-size: ${APP_MAX_PAGE_SIZE:200}
    allowed-schemas: ${APP_ALLOWED_SCHEMAS:}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
