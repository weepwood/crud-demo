name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test and package backend
        working-directory: backend
        run: mvn --quiet --batch-mode clean verify > maven.log 2>&1
      - name: Upload backend failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: backend/maven.log
          retention-days: 3

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Type-check and build frontend
        working-directory: frontend
        run: npm run build
